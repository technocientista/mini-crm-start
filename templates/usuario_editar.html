<!DOCTYPE html>
<html lang="pt-BR" data-theme="{{ session.get('tema', 'dark') }}">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuário - Start CRM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="app-layout">

        {% include 'partials/sidebar.html' %}
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1>Editar usuário</h1>
                    <p>Atualize os dados de {{ usuario_edicao.nome }}.</p>
                </div>
            </header>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="success-alert">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}

            <section class="panel">
                <form method="POST" action="{{ url_for('usuario_editar', usuario_id=usuario_edicao.id) }}" class="form-grid">

                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input 
                            type="text" 
                            id="nome" 
                            name="nome" 
                            value="{{ usuario_edicao.nome }}" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            value="{{ usuario_edicao.email }}" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="perfil">Perfil</label>
                        <select id="perfil" name="perfil" required>
                            <option value="VENDEDOR" {% if usuario_edicao.perfil == 'VENDEDOR' %}selected{% endif %}>
                                Vendedor
                            </option>

                            <option value="ADMIN" {% if usuario_edicao.perfil == 'ADMIN' %}selected{% endif %}>
                                Admin
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="comissao_percentual">Comissão (%)</label>
                        <input 
                            type="number" 
                            id="comissao_percentual" 
                            name="comissao_percentual" 
                            step="0.01" 
                            min="0" 
                            value="{{ usuario_edicao.comissao_percentual }}"
                        >
                    </div>

                    <div class="form-group">
                        <label for="ativo">Status</label>
                        <select id="ativo" name="ativo" required>
                            <option value="1" {% if usuario_edicao.ativo == 1 %}selected{% endif %}>
                                Ativo
                            </option>

                            <option value="0" {% if usuario_edicao.ativo == 0 %}selected{% endif %}>
                                Inativo
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="nova_senha">Nova senha</label>
                        <input 
                            type="password" 
                            id="nova_senha" 
                            name="nova_senha"
                            placeholder="Deixe em branco para manter a senha atual"
                        >
                    </div>

                    <div class="form-actions">
                        <button type="submit">Salvar alterações</button>
                    </div>

                    <div class="form-actions">
                        <a href="{{ url_for('usuarios') }}" class="button-link secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </section>
        </main>

    </div>

</body>
</html>
