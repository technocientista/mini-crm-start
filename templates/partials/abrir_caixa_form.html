<form
    method="POST"
    action="{{ url_for('caixa') }}"
    class="form-grid abrir-caixa-form"
>
    <input type="hidden" name="acao" value="abrir">

    <div class="form-group">
        <label for="valor_inicial_caixa">Valor inicial</label>
        <input
            type="text"
            id="valor_inicial_caixa"
            name="valor_inicial"
            placeholder="Ex: 100,00"
            inputmode="decimal"
            autocomplete="off"
            autofocus
            required
        >
    </div>

    <div class="form-group full">
        <label for="observacoes_abertura_caixa">Observações</label>
        <textarea
            id="observacoes_abertura_caixa"
            name="observacoes_abertura"
            rows="3"
            placeholder="Ex: caixa iniciado com troco"
        ></textarea>
    </div>

    <div class="edit-actions-row full">
        <button
            type="submit"
            class="icon-action-button ui-command-action ui-icon-wallet"
        >
            Abrir caixa
        </button>
    </div>
</form>
