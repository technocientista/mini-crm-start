name: Deploy PC da Loja

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Executar deploy
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          & "${{ github.workspace }}\scripts\deploy-loja.ps1" `
            -SourceDirectory "${{ github.workspace }}"